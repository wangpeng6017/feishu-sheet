# 复制为 config.yaml 后填写真实配置

feishu:
  app_id: "cli_xxxxxxxx"
  app_secret: "xxxxxxxxxxxxxxxx"
  # 文档类型: spreadsheet（电子表格）| bitable（多维表格）
  type: spreadsheet
  # 电子表格：从 URL .../sheets/SPREADSHEET_TOKEN?sheet=SHEET_ID 获取
  spreadsheet_token: "xxxx"
  sheet_id: "xxxxx"
  # 多维表格模式才需要（type: bitable）
  # app_token: "xxx"
  # table_id: "tblxxx"
  fields:
    channel: "频道"
    name: "名称"
    phone: "账号"
    current_credit: "当前积分"
    updated_at: "更新时间"
  # 匹配已有行: phone=按「账号」列 | name=按「名称」列
  match_by: "phone"

jimeng:
  auto_receive: false
  # 每个账号可只注册部分平台；按实际填写对应凭证，未填的平台会自动跳过
  accounts:
    # 示例 1：仅即梦
    - channel: "channel1"
      name: "name1"
      phone: "13800000001"
      cookie: "x-web-secsdk-uid=...; sessionid=...; sid_guard=...; ttwid=..."

    # 示例 2：仅小云雀（从 xyq.jianying.com 浏览器 curl 的 -b 复制）
    # - channel: "channel2"
    #   name: "name2"
    #   phone: "13800000002"
    #   xyq_cookie: "sessionid_pippitcn_web=...; sid_guard_pippitcn_web=...; ttwid=..."

    # 示例 3：仅 LibTV（从 liblib.tv 网页复制 usertoken_online）
    # - channel: "channel3"
    #   name: "name3"
    #   phone: "13800000003"
    #   libtv_token: "your-usertoken_online-value"

    # 示例 4：多平台组合
    # - channel: "channel4"
    #   name: "name4"
    #   phone: "13800000004"
    #   cookie: "..."
    #   xyq_cookie: "..."
    #   libtv_token: "..."
