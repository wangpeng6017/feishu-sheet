# 复制为 config.yaml 后填写真实配置

feishu:
  app_id: "cli_xxxxxxxx"
  app_secret: "xxxxxxxxxxxxxxxx"
  # 文档类型: spreadsheet（电子表格）| bitable（多维表格）
  type: spreadsheet
  # 电子表格：从 URL .../sheets/SPREADSHEET_TOKEN?sheet=SHEET_ID 获取
  spreadsheet_token: "xxxx"
  sheet_id: "xxxxx"
  # 多维表格模式才需要（type: bitable）
  # app_token: "xxx"
  # table_id: "tblxxx"
  fields:
    channel: "频道"
    name: "名称"
    phone: "账号"
    current_credit: "当前积分"
    updated_at: "更新时间"
  # 匹配已有行: phone=按「账号」列 | name=按「名称」列
  match_by: "phone"

jimeng:
  auto_receive: false
  accounts:
    - channel: "channel1"
      name: "name1"
      phone: "xxxxxxxxxx"
      # 从浏览器 curl 的 -b 参数复制完整 Cookie（单引号包裹，内含 JSON 双引号无需转义）
      cookie: "x-web-secsdk-uid=...; sessionid=...; sid_guard=...; ttwid=..."
